<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>March Madness</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
display:grid;
place-items:center;
overflow:hidden;
font-family:Impact,Arial Black,sans-serif;
color:white;

background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.8)),
url("https://images.unsplash.com/photo-1519861531473-9200262188bf?auto=format&fit=crop&w=1920&q=80");

background-size:cover;
background-position:center;
animation:bgPulse 8s infinite alternate;
}

@keyframes bgPulse{
0%{filter:brightness(.9);}
100%{filter:brightness(1.2);}
}

#container{
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
text-align:center;
transform:translateY(-6vh);
}

h1{
margin:0;
font-size:clamp(3rem,8vw,6rem);
text-shadow:0 0 15px black;
}

.subtitle{
margin-top:-10px;
font-size:clamp(1.2rem,3vw,2rem);
letter-spacing:2px;
color:#ffd27f;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 8px #ff9d00;}
to{text-shadow:0 0 22px #ff4500;}
}

#countdown{
font-size:clamp(2rem,5vw,3.5rem);
text-shadow:0 0 10px black;
}

.buttons{
display:flex;
gap:18px;
flex-wrap:wrap;
justify-content:center;
}

button{
font-size:clamp(1.3rem,4vw,2.3rem);
padding:16px 34px;
border-radius:18px;
border:none;
cursor:pointer;
background:#ff7a00;
color:white;
box-shadow:0 0 15px rgba(255,120,0,.7);
transition:transform .15s ease;
}

button:hover{
transform:scale(1.08);
}

/* overlay */

#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

#overlay img{
max-width:70vw;
max-height:70vh;
animation:spin 1s infinite linear;
}

@keyframes spin{
from{transform:rotate(0deg) scale(1);}
to{transform:rotate(360deg) scale(1.3);}
}

/* rain */

.fall{
position:fixed;
top:-100px;
font-size:3.5rem;
animation:fall linear forwards;
z-index:999;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(720deg);
}
}

</style>
</head>

<body>

<div id="container">

<h1>🏀 MARCH MADNESS 🏀</h1>
<h2 class="subtitle">We're so back</h2>

<div id="countdown">LOADING...</div>

<div class="buttons">

<button onclick="basketballRain()">🏀 Basketballs</button>

<button onclick="shotRain()">🥃 So Many Shots</button>

<button onclick="fireball()">🔥 Give it you're all</button>

</div>

</div>

<div id="overlay" onclick="hideOverlay()">
<img id="overlayImg">
</div>

<script>

const overlay=document.getElementById("overlay")
const overlayImg=document.getElementById("overlayImg")

function fireball(){

overlayImg.src="https://static.specsonline.com/wp-content/uploads/2021/11/008800414470.jpg"
overlay.style.display="flex"

}

function hideOverlay(){
overlay.style.display="none"
}

/* basketball rain */

function basketballRain(){

for(let i=0;i<40;i++){

setTimeout(()=>{

const s=document.createElement("div")
s.className="fall"

s.textContent="🏀"

s.style.left=Math.random()*100+"vw"
s.style.animationDuration=(Math.random()*2+2)+"s"

document.body.appendChild(s)

setTimeout(()=>s.remove(),4000)

},i*90)

}

}

/* shot rain */

function shotRain(){

for(let i=0;i<35;i++){

setTimeout(()=>{

const s=document.createElement("div")
s.className="fall"

s.textContent=["🥃","🍺","🍻"][Math.floor(Math.random()*3)]

s.style.left=Math.random()*100+"vw"
s.style.animationDuration=(Math.random()*2+2)+"s"

document.body.appendChild(s)

setTimeout(()=>s.remove(),4000)

},i*110)

}

}

/* countdown */

const target=new Date("March 21, 2026 18:00:00")
const cd=document.getElementById("countdown")

setInterval(()=>{

const diff=target-new Date()

if(diff<=0){

document.body.innerHTML="🏀🔥 IT'S MARCH MADNESS 🔥🏀"
return

}

const d=Math.floor(diff/86400000)
const h=Math.floor(diff/3600000%24)
const m=Math.floor(diff/60000%60)
const s=Math.floor(diff/1000%60)

cd.textContent=`⏳ ${d}D ${h}H ${m}M ${s}S UNTIL TIPOFF ⏳`

},1000)

</script>

</body>
</html>
